<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>HTML Tailwind CSS Website</title>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./favicon_io/apple-touch-icon.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./favicon_io/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="./favicon_io/favicon-16x16.png"
		/>
		<link rel="manifest" href="./favicon_io/site.webmanifest" />
		<link
			href="https://cdn.jsdelivr.net/npm/daisyui@5"
			rel="stylesheet"
			type="text/css"
		/>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body>
		<div class="navbar bg-base-100 shadow-sm">
			<div class="navbar-start">
				<div class="dropdown">
					<div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							class="h-5 w-5"
							fill="none"
							viewBox="0 0 24 24"
							stroke="currentColor"
						>
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								stroke-width="2"
								d="M4 6h16M4 12h8m-8 6h16"
							/>
						</svg>
					</div>
					<ul
						tabindex="-1"
						class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
					>
						<li><a>Home</a></li>
						<li><a>About Us</a></li>
						<li><a>Our Services</a></li>
						<li><a>Contact Us</a></li>
					</ul>
				</div>
				<a class="btn btn-ghost text-xl">SimplerPay</a>
			</div>
			<div class="navbar-center hidden lg:flex">
				<ul class="menu menu-horizontal px-1">
					<li><a>Home</a></li>
					<li><a>About Us</a></li>
					<li><a>Our Services</a></li>
					<li><a>Contact Uses</a></li>
				</ul>
			</div>
		</div>
		<section
			class="h-screen w-full bg-[url(./assets/annie-spratt-unsplash.jpg)] flex flex-col justify-center align-center text-white"
		>
			<h1 class="text-center text-3xl p-4">
				Welcome to our <span>Website</span>
			</h1>
			<p class="text-center text-2xl mt-4">Join our community</p>
			<div class="flex justify-center align-center">
				<a
					href="#"
					class="text-center text-xl mt-8 border-4 border-black border-solid rounded-2xl w-3xs p-2 block bg-black text-white shadow-lg"
					>Explore More</a
				>
			</div>
		</section>
	</body>
</html>
